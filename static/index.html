<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dental AI Predictor</title>
    <!-- Tailwind CSS for sleek UI -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        #viewer3d { width: 100%; height: 500px; background-color: #f1f5f9; border-radius: 0.5rem; overflow: hidden; position: relative;}
        .loader {
            border: 4px solid #f3f3f3; border-top: 4px solid #3b82f6; border-radius: 50%;
            width: 40px; height: 40px; animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 font-sans">
    <div class="max-w-5xl mx-auto p-6">
        <header class="mb-8 border-b pb-4 flex justify-between items-center">
            <div>
                <h1 class="text-3xl font-bold text-gray-900">Dental AI Predictor</h1>
                <p class="text-sm text-gray-500 mt-1">Cloud ML Interface</p>
            </div>
            <div class="bg-blue-100 text-blue-800 text-xs font-semibold px-3 py-1 rounded-full">Deployed on Serverless Cloud</div>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <!-- Sidebar controls -->
            <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100">
                <h2 class="text-lg font-semibold mb-4 text-gray-800">1. Engine Pipeline</h2>
                
                <div class="mb-4">
                    <label class="block text-sm font-medium text-gray-700 mb-2">API Server URL</label>
                    <input type="text" id="apiUrl" value="http://localhost:8000" class="block w-full text-sm p-2 border border-gray-300 rounded-md focus:outline-none focus:ring-blue-500 focus:border-blue-500 mb-4"/>
                </div>

                <div class="mb-6">
                    <label class="block text-sm font-medium text-gray-700 mb-2">Upload Scan (.stl / .ply)</label>
                    <input type="file" id="scanUpload" accept=".stl,.ply" class="block w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-md file:border-0 file:text-sm file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100 cursor-pointer"/>
                </div>

                <button id="predictBtn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2.5 px-4 rounded-lg transition-colors flex justify-center items-center opacity-50 cursor-not-allowed" disabled>
                    <span id="btnText">Predict Missing Tooth</span>
                    <div id="loadingSpinner" class="loader ml-2 hidden" style="width:20px;height:20px;border-width:3px;"></div>
                </button>

                <div class="mt-8 bg-blue-50 p-4 rounded-lg border border-blue-100">
                    <h3 class="text-xs font-bold text-blue-800 uppercase tracking-wider mb-2">Test with Real Medical Data</h3>
                    <p class="text-xs text-blue-700 mb-3 leading-relaxed">Download clinical scans from the NIH 3D Print Exchange:</p>
                    <a href="https://3dprint.nih.gov/system/files/3d_model/3DPX-001002/Human_Mandible.stl" target="_blank" class="block w-full text-center bg-white hover:bg-blue-100 text-blue-700 font-bold py-1.5 px-3 rounded text-xs border border-blue-300 transition-colors mb-2">
                        📥 Download Human Mandible (NIH)
                    </a>
                    <a href="https://3dprint.nih.gov/system/files/3d_model/3DPX-000571/Human_Mandibular_Molar.stl" target="_blank" class="block w-full text-center bg-white hover:bg-blue-100 text-blue-700 font-bold py-1.5 px-3 rounded text-xs border border-blue-300 transition-colors">
                        📥 Download Human Molar (NIH)
                    </a>
                </div>

                <div class="mt-8">
                    <h3 class="text-sm font-semibold text-gray-700 mb-3 border-b pb-1">AI Logs</h3>
                    <div id="logs" class="bg-gray-900 text-green-400 p-3 rounded-lg text-xs font-mono h-40 overflow-y-auto whitespace-pre-wrap">System ready for STL ingestion.</div>
                </div>
            </div>

            <!-- 3D Viewer -->
            <div class="md:col-span-2">
                <div id="viewer3d" class="shadow-sm border border-gray-100"></div>
                <!-- ...legends -->
            </div>
        </div>
    </div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/STLLoader.js"></script>
    <script src="app.js"></script>
</body>
</html>
